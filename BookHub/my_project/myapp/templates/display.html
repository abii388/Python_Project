{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link href="{% static 'css/login.css' %}" rel='stylesheet' type='text/css'>
    <title>Document</title>
    <style>
        table, th, td {
          border:1px solid black;
          border-spacing: 0px;
        }
      
        
        .table{
              background-color:whitesmoke;
              width: 213px;
              height: 36px;
              margin: 200px auto;
        }
        .trr{
            background-color: bisque;
        }
        </style>
</head>
<body>
    <div class="row">
        <div class="col-sm-10 offset-1">
       
            <hr>
    
        
           
            <table class="table" style="width:100%" >
                <thead>
                    <tr style="background-color: bisque;">
                        <th colspan="6" style="text-align: center; color:blue; font-size:1cm; " >Book update</th>
                    </tr>
                    <tr style="color: blue;" class="trr">
                        
                        <th>Book id</th>
                        <th>Book name</th>
                        <th>Author name</th>
                    
                        <th>quantity</th>
                        <th>update</th>
                    </tr>
                </thead>
    
                <tbody>
                    
                         
                    {% for items in Books  %}
                        <tr>
                          
                           
                            <td>{{items.Book_id}}</td>
                            <td>{{items.Book_name}}</td>
                            <td>{{items.Author_name}}</td>
                           
                            <td>{{items.Quantity}}</td>
                            <td><a href="/edit/{{items.Book_id}}" class="btn btn-primary" >edit</a>  
                                <a href="/del/{{items.Book_id}}"class="btn btn-danger" >delete</a></td> 

                            
                        </tr>
                    {% endfor %}
                        
                </tbody>
    
            </table>
    
            
    
        </div>
    </div>


<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
